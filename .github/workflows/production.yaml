name: Deploy Production (Production)

on:
  # push:
  #   tags:
  #     - 'v*'
  push:

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  IMAGE_TAG: prod-${{ github.ref_name }}-${{ github.run_number }}

jobs:
  build:
    name: Build docker Image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: setup environment
        run: |
          echo "API_VERSION=${{ github.ref_name }}-${{ github.run_number }}" >> .env

      - name: Login to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) from the Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}
          tags: ${{ env.IMAGE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build NodeModules Layer
        run: |
          mkdir -p nodejs-wd
          cp package.json bun.lock nodejs-wd/
          cd nodejs-wd
          bun install --production
          cd ..

          mkdir -p nodejs/node_modules
          mv nodejs-wd/node_modules/@prisma nodejs/node_modules
          zip -r node_modules_layer_prisma.zip nodejs
          rm -rf nodejs
          mv nodejs-wd nodejs
          zip -r node_modules_layer.zip nodejs

      - name: Publish Node Modules Layer
        id: publish-layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-prisma-layer" \
            --zip-file fileb://node_modules_layer_prisma.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "prisma_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-prisma-layer" \
            --zip-file fileb://node_modules_layer.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

      - name: Build Lambda Function
        run: |
          bun install
          bun prisma generate --generator=client
          mkdir upload
          cp -r dist generated package.json upload/

      - name: Deploy Lambda Function
        uses: aws-actions/aws-lambda-deploy@v1.1.0
        with:
          function-name: ${{ secrets.FUNCTION_NAME }}
          runtime: nodejs24.x
          code-artifacts-dir: upload
          s3-bucket: ${{ secrets.FUNCTION_S3_BUCKET }}
          layers: '["${{ steps.publish-layer.outputs.prisma_layer_arn }}", "${{ steps.publish-layer.outputs.layer_arn }}"]'
