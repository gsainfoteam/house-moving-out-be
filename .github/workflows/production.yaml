name: Deploy Production (Production)

on:
  # push:
  #   tags:
  #     - 'v*'
  push:

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  IMAGE_TAG: prod-${{ github.ref_name }}-${{ github.run_number }}

jobs:
  build:
    name: Build docker Image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: setup environment
        run: |
          echo "API_VERSION=${{ github.ref_name }}-${{ github.run_number }}" >> .env

      - name: Login to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) from the Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}
          tags: ${{ env.IMAGE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Lambda Function
        run: |
          bun install
          bun prisma generate --generator=client
          bun run build
          rm -rf node_modules
          bun install --production
          mkdir upload
          cp -r dist generated node_modules package.json upload/

      - name: Deploy Lambda Function
        uses: aws-actions/aws-lambda-deploy@v1.1.0
        with:
          function-name: ${{ secrets.FUNCTION_NAME }}
          runtime: nodejs24.x
          code-artifacts-dir: upload
          s3-bucket: ${{ secrets.FUNCTION_S3_BUCKET }}
