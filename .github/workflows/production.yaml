name: Deploy Production (Production)

on:
  # push:
  #   tags:
  #     - 'v*'
  push:

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  IMAGE_TAG: prod-${{ github.ref_name }}-${{ github.run_number }}

jobs:
  build:
    name: Build docker Image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: setup environment
        run: |
          echo "API_VERSION=${{ github.ref_name }}-${{ github.run_number }}" >> .env

      - name: Login to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) from the Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}
          tags: ${{ env.IMAGE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build NodeModules Layer
        run: |
          mkdir -p nodejs-wd
          cp package.json bun.lock nodejs-wd/
          cd nodejs-wd
          bun install --production
          cd ..

          mkdir -p nodejs/node_modules/@prisma
          mv nodejs-wd/node_modules/@prisma/client nodejs/node_modules/@prisma
          zip -rq node_modules_layer_prisma_client.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules/@prisma
          mv nodejs-wd/node_modules/@prisma/studio-core nodejs/node_modules/@prisma
          zip -rq node_modules_layer_prisma_studio_core.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules/@prisma
          mv nodejs-wd/node_modules/@prisma/engines nodejs/node_modules/@prisma
          zip -rq node_modules_layer_prisma_engines.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules
          mv nodejs-wd/node_modules/@prisma nodejs/node_modules
          zip -rq node_modules_layer_prisma.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules
          mv nodejs-wd/node_modules/effect nodejs-wd/node_modules/@aws-sdk nodejs/node_modules
          zip -rq node_modules_layer_other1.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules
          mv nodejs-wd/node_modules/@electric-sql nodejs-wd/node_modules/libphonenumber-js nodejs/node_modules
          zip -rq node_modules_layer_other2.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules
          mv nodejs-wd/node_modules/typescript nodejs-wd/node_modules/exceljs nodejs/node_modules
          zip -rq node_modules_layer_other3.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules
          mv nodejs-wd/node_modules/swagger-ui-dist nodejs-wd/node_modules/rxjs nodejs/node_modules
          zip -rq node_modules_layer_other3.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules
          mv nodejs-wd/node_modules/@smithy nodejs-wd/node_modules/class-validator nodejs/node_modules
          zip -rq node_modules_layer_other4.zip nodejs
          rm -rf nodejs

          mkdir -p nodejs/node_modules
          mv nodejs-wd/node_modules/@nestjs nodejs/node_modules
          zip -rq node_modules_layer_nestjs.zip nodejs
          rm -rf nodejs

          mv nodejs-wd nodejs
          zip -rq node_modules_layer.zip nodejs

      - name: Publish Node Modules Layer
        id: publish-layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-prisma-client-layer" \
            --zip-file fileb://node_modules_layer_prisma_client.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "prisma_client_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-prisma-studio-core-layer" \
            --zip-file fileb://node_modules_layer_prisma_studio_core.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "prisma_studio_core_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-prisma-engines-layer" \
            --zip-file fileb://node_modules_layer_prisma_engines.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "prisma_engines_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-nestjs-layer" \
            --zip-file fileb://node_modules_layer_nestjs.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "nestjs_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-prisma-layer" \
            --zip-file fileb://node_modules_layer_prisma.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "prisma_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-other1-layer" \
            --zip-file fileb://node_modules_layer_other1.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "other1_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-other2-layer" \
            --zip-file fileb://node_modules_layer_other2.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "other2_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-other3-layer" \
            --zip-file fileb://node_modules_layer_other3.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "other3_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-other4-layer" \
            --zip-file fileb://node_modules_layer_other4.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "other4_layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "house-moving-out-node-modules-layer" \
            --zip-file fileb://node_modules_layer.zip \
            --compatible-runtimes nodejs24.x \
            --query 'LayerVersionArn' --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

      - name: Build Lambda Function
        run: |
          bun install
          bun prisma generate --generator=client
          mkdir upload
          cp -r dist generated package.json upload/

      - name: Deploy Lambda Function
        uses: aws-actions/aws-lambda-deploy@v1.1.0
        with:
          function-name: ${{ secrets.FUNCTION_NAME }}
          runtime: nodejs24.x
          code-artifacts-dir: upload
          layers: |
            [
              "${{ steps.publish-layer.outputs.prisma_client_layer_arn }}",
              "${{ steps.publish-layer.outputs.prisma_studio_core_layer_arn }}",
              "${{ steps.publish-layer.outputs.prisma_engines_layer_arn }}",
              "${{ steps.publish-layer.outputs.nestjs_layer_arn }}",
              "${{ steps.publish-layer.outputs.prisma_layer_arn }}",
              "${{ steps.publish-layer.outputs.other1_layer_arn }}",
              "${{ steps.publish-layer.outputs.other2_layer_arn }}",
              "${{ steps.publish-layer.outputs.other3_layer_arn }}",
              "${{ steps.publish-layer.outputs.other4_layer_arn }}",
              "${{ steps.publish-layer.outputs.layer_arn }}",
            ]
